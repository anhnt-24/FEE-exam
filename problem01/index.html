<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>To-Do List</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <main class="todo-app">
    <h1 class="todo-app__title">To-Do List</h1>

    <p class="todo-app__hint">Enter text into the input field to add items to your list.</p>
    <p class="todo-app__hint">Click the "X" to remove the item from your list.</p>
    <p class="todo-app__hint">Click the item to mark it as complete.</p>

    <!-- Submitting the form covers both ways of adding: pressing Enter in the
         input, and clicking the (+) button, which is the submit button. -->
    <form class="todo-form" id="todoForm">
      <input
        type="text"
        id="todoInput"
        class="todo-form__input"
        placeholder="Input to do"
        autocomplete="off" />
      <button type="submit" id="addBtn" class="todo-form__add" aria-label="Add task">+</button>
    </form>

    <ul class="todo-list" id="todoList"></ul>
  </main>

  <script src="js/script.js"></script>
</body>
</html>
