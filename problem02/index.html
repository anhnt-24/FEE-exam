<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spiral Matrix</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <main class="spiral">
    <h1 class="spiral__title">Spiral Matrix</h1>
    <p class="spiral__hint">Enter a number n to generate an n &times; n matrix filled from 1 to n&sup2; in spiral order.</p>

    <form class="spiral__form" id="spiralForm">
      <label for="sizeInput">n =</label>
      <input type="number" id="sizeInput" min="1" max="15" value="5" />
      <button type="submit">Generate</button>
    </form>

    <div id="output" class="spiral__output"></div>
  </main>

  <script src="js/spiralMatrix.js"></script>
  <script src="js/demo.js"></script>
</body>
</html>
